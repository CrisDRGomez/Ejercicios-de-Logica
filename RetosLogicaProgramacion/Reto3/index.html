<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Calculadora Factorial</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <div class="card">

    <div class="header">
        <span class="badge">SA-PLD3</span>
        <h1>Calculadora<br/>Factorial</h1>
        <p class="subtitle">Ingresa un número entero positivo</p>
    </div>

    <div class="input-group">
        <label for="inputNumero">número</label>
        <input type="text" id="inputNumero" placeholder="ej. 5" />
    </div>

    <button onclick="calcular()">Calcular factorial</button>

    <div class="resultado" id="resultado"></div>

    <p class="formula">n! = 1 × 2 × 3 × ... × n</p>

    </div>

    <script src="script.js"></script>
</body>
</html>
